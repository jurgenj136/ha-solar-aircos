<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Airco</title>
    <style>
      :root {
        color-scheme: light dark;
        --pad: 16px;
        --gap: 12px;
        --radius: 10px;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue',
          Arial, sans-serif;
        margin: 0;
        padding: var(--pad);
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        gap: var(--gap);
        margin-bottom: var(--pad);
      }
      h1 {
        font-size: 1.4rem;
        margin: 0;
      }
      .card {
        border: 1px solid rgba(127, 127, 127, 0.25);
        border-radius: var(--radius);
        padding: var(--pad);
        margin-bottom: var(--pad);
      }
      .row {
        display: flex;
        gap: var(--gap);
        flex-wrap: wrap;
        align-items: center;
      }
      .row > * {
        flex: 1 1 240px;
      }
      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(127, 127, 127, 0.25);
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
        text-align: left;
      }
      .tag {
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(127, 127, 127, 0.25);
        font-size: 0.85rem;
      }
      .tag.warn {
        background: rgba(217, 119, 6, 0.15);
      }
      .notice {
        display: none;
        margin-bottom: var(--pad);
        padding: 12px 14px;
        border-radius: var(--radius);
        border: 1px solid rgba(127, 127, 127, 0.25);
      }
      .notice.show {
        display: block;
      }
      .notice.info {
        background: rgba(59, 130, 246, 0.08);
      }
      .notice.success {
        background: rgba(22, 163, 74, 0.1);
      }
      .notice.error {
        background: rgba(220, 38, 38, 0.12);
      }
      .muted {
        opacity: 0.78;
      }
      .decision {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Smart Airco</h1>
        <span id="status" class="tag">Loading…</span>
      </header>

      <div id="notice" class="notice"></div>

      <section id="instance-picker" class="card" style="display: none">
        <div class="row">
          <div>
            <label
              >Controller instance:
              <select id="sel-controller" style="min-width: 260px"></select>
            </label>
          </div>
        </div>
      </section>

      <section class="card">
        <h3 style="margin-top: 0">Global Settings</h3>
        <div class="row" style="margin-bottom: 10px">
          <div>
            <label
              >Forecast sensor:
              <select id="sel-forecast" style="min-width: 260px"></select>
            </label>
          </div>
          <div>
            <label
              >Production sensor:
              <select id="sel-production" style="min-width: 260px"></select>
            </label>
          </div>
          <div>
            <label
              >Net export sensor:
              <select id="sel-netexport" style="min-width: 260px"></select>
            </label>
          </div>
          <div>
            <label
              >Update interval (min):
              <input type="number" id="inp-interval" min="1" max="60" style="width: 80px" />
            </label>
          </div>
          <div style="align-self: flex-end">
            <button id="btn-save-global">Save</button>
          </div>
        </div>
        <div class="row">
          <button id="btn-evaluate">Evaluate Conditions</button>
          <button id="btn-execute">Execute Decisions</button>
        </div>
      </section>

      <section class="card">
        <h3 style="margin-top: 0">Overview</h3>
        <div id="overview">Fetching…</div>
      </section>

      <section class="card">
        <h3 style="margin-top: 0">Climate Entities</h3>
        <div class="row" style="margin-bottom: 12px">
          <div>
            <label
              >Climate:
              <select id="add-entity" style="min-width: 260px"></select>
            </label>
          </div>
          <div>
            <label
              >Name:
              <input id="add-name" type="text" placeholder="Living Room" style="min-width: 200px" />
            </label>
          </div>
          <div>
            <label
              >Priority:
              <input id="add-priority" type="number" min="1" max="10" value="1" style="width: 80px" />
            </label>
          </div>
          <div>
            <label><input id="add-enabled" type="checkbox" checked /> Enabled</label>
          </div>
        </div>
        <div class="row" style="margin-bottom: 12px">
          <div>
            <label><input id="add-use-estimated" type="checkbox" checked /> Use estimated power</label>
          </div>
          <div>
            <label
              >Estimated W:
              <input id="add-wattage" type="number" min="100" max="5000" value="1000" style="width: 100px" />
            </label>
          </div>
          <div>
            <label
              >Power sensor:
              <select id="add-power-sensor" style="min-width: 260px"></select>
            </label>
          </div>
          <div style="align-self: flex-end">
            <button id="btn-add-climate">Add Climate</button>
          </div>
        </div>
        <table id="climates">
          <thead>
            <tr>
              <th>Name</th>
              <th>Entity</th>
              <th>Priority</th>
              <th>Enabled</th>
              <th>Windows</th>
              <th>Power</th>
              <th>Decision</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>

    <script>
      const getHass = () => {
        try {
          return window.parent && window.parent.hass ? window.parent.hass : null;
        } catch (e) {
          return null;
        }
      };

      const haCall = async (domain, service, data = {}) => {
        const hass = getHass();
        if (hass && hass.callService) {
          const payload =
            domain === 'smart_airco' && activeEntryId
              ? { config_entry_id: activeEntryId, ...data }
              : data;
          await hass.callService(domain, service, payload);
          return { result: 'ok' };
        }
        throw new Error('Not embedded in Home Assistant. Open this panel via the HA sidebar.');
      };

      const qs = (sel) => document.querySelector(sel);
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const stateFilter = { forecastEntity: '', productionEntity: '', netExportEntity: '' };
      let activeEntryId = null;

      const showNotice = (message, tone = 'info') => {
        const notice = qs('#notice');
        notice.textContent = message;
        notice.className = `notice show ${tone}`;
      };

      const clearNotice = () => {
        const notice = qs('#notice');
        notice.textContent = '';
        notice.className = 'notice';
      };

      const selectOptions = (items, selected = '', emptyLabel = '(none)') =>
        ['']
          .concat(items)
          .map(
            (value) =>
              `<option value="${value}" ${value === selected ? 'selected' : ''}>${
                value || emptyLabel
              }</option>`
          )
          .join('');

      const multiSelectOptions = (items, selected = []) =>
        items
          .map(
            (value) =>
              `<option value="${value}" ${selected.includes(value) ? 'selected' : ''}>${value}</option>`
          )
          .join('');

      const getController = (states) =>
        getControllers(states)[0] || null;

      const getControllers = (states) =>
        states.filter(
          (s) => s.entity_id.startsWith('climate.') && s.attributes?.smart_airco_controller === true
        );

      const waitForReload = async () => {
        for (let attempt = 0; attempt < 8; attempt += 1) {
          const loaded = await load();
          if (loaded) return true;
          await wait(500);
        }
        return false;
      };

      const load = async () => {
        try {
          const hass = getHass();
          if (!(hass && hass.callApi)) {
            qs('#status').textContent = 'Open via HA Sidebar';
            qs('#overview').textContent = 'Please open this panel from the Home Assistant sidebar.';
            return false;
          }
          const states = await hass.callApi('get', 'states');
          const controllers = getControllers(states);
          if (!controllers.length) {
            qs('#status').textContent = 'Not configured';
            qs('#overview').textContent =
              'Smart Airco controller not found yet. Create the integration first, then refresh this panel.';
            qs('#climates tbody').innerHTML = '';
            return false;
          }
          if (!activeEntryId || !controllers.some((c) => c.attributes?.smart_airco_entry_id === activeEntryId)) {
            activeEntryId = controllers[0].attributes?.smart_airco_entry_id || null;
          }
          const controller =
            controllers.find((c) => c.attributes?.smart_airco_entry_id === activeEntryId) ||
            controllers[0];
          activeEntryId = controller.attributes?.smart_airco_entry_id || activeEntryId;
          const attrs = controller.attributes || {};

          const selector = document.getElementById('sel-controller');
          const picker = document.getElementById('instance-picker');
          if (controllers.length > 1) {
            selector.innerHTML = controllers
              .map((ctrl) => {
                const entryId = ctrl.attributes?.smart_airco_entry_id || '';
                const title = ctrl.attributes?.friendly_name || ctrl.entity_id;
                return `<option value="${entryId}" ${entryId === activeEntryId ? 'selected' : ''}>${title}</option>`;
              })
              .join('');
            picker.style.display = 'block';
          } else {
            picker.style.display = 'none';
          }

          // Build entity picker lists
          const powerOptions = states
            .filter(
              (s) =>
                s.entity_id.startsWith('sensor.') &&
                (s.attributes?.device_class === 'power' ||
                  (s.attributes?.unit_of_measurement || '').toString().toLowerCase().includes('w'))
            )
            .map((s) => s.entity_id)
            .sort();
          const windowOptions = states
            .filter(
              (s) =>
                s.entity_id.startsWith('binary_sensor.') &&
                ['door', 'window', 'opening'].includes(s.attributes?.device_class || '')
            )
              .map((s) => s.entity_id)
              .sort();
          const climateOptions = states
            .filter((s) => s.entity_id.startsWith('climate.'))
            .map((s) => s.entity_id)
            .sort();
          const configuredClimates = attrs.configured_climate_entity_ids || [];
          const availableClimateOptions = climateOptions.filter(
            (entityId) => !configuredClimates.includes(entityId) && entityId !== controller.entity_id
          );

          if (controller) qs('#status').textContent = controller.state.toUpperCase();

          const criticalErrors = attrs.critical_input_errors || [];
          const criticalErrorsHtml = criticalErrors.length
            ? `<div class="row" style="margin-top:10px"><div><strong>Critical input errors:</strong> ${criticalErrors.join(', ')}</div></div>`
            : '';

          qs('#overview').innerHTML = `
            <div class="row">
              <div><strong>Status:</strong> ${attrs.decision_reason || 'unknown'}</div>
              <div><strong>Predicted Surplus:</strong> ${attrs.predicted_surplus || 0} W</div>
              <div><strong>Current Surplus:</strong> ${attrs.current_surplus || 0} W</div>
              <div><strong>Running ACs:</strong> ${attrs.running_entities || 0}</div>
            </div>
            <div class="row" style="margin-top:10px">
              <div><strong>Manual overrides:</strong> ${attrs.manual_override_entities || 0}</div>
              <div><strong>Critical inputs valid:</strong> ${attrs.critical_inputs_valid ? 'yes' : 'no'}</div>
            </div>
            ${criticalErrorsHtml}`;

          // Resolve configured energy sensor ids from controller attributes
          const forecastEntity = controller?.attributes?.forecast_sensor || '';
          const productionEntity = controller?.attributes?.production_sensor || '';
          const netExportEntity = controller?.attributes?.net_export_sensor || '';
          stateFilter.forecastEntity = forecastEntity;
          stateFilter.productionEntity = productionEntity;
          stateFilter.netExportEntity = netExportEntity;
          const updateIntervalMin = controller?.attributes?.update_interval_minutes ?? 5;

          // Populate global selectors
          const forecastOptions = states
            .filter((s) => s.entity_id.startsWith('sensor.'))
            .map((s) => s.entity_id)
            .sort();
          document.getElementById('sel-forecast').innerHTML = selectOptions(
            forecastOptions,
            forecastEntity
          );
          document.getElementById('sel-production').innerHTML = selectOptions(
            powerOptions,
            productionEntity
          );
          document.getElementById('sel-netexport').innerHTML = selectOptions(
            powerOptions,
            netExportEntity
          );
          document.getElementById('inp-interval').value = updateIntervalMin;
          document.getElementById('add-entity').innerHTML = selectOptions(
            availableClimateOptions,
            '',
            availableClimateOptions.length ? '(select climate)' : '(all climates already added)'
          );
          document.getElementById('add-power-sensor').innerHTML = selectOptions(powerOptions);

          // Build climates table from controller attributes
          const tbody = qs('#climates tbody');
          tbody.innerHTML = '';
          const managedClimates = Array.isArray(attrs.managed_climates)
            ? attrs.managed_climates
            : [];

          for (const climate of managedClimates) {
            const name = climate.name || climate.entity_id;
            const priority = climate.priority;
            const enabled = climate.enabled;
            const windows = climate.windows_open;
            const power = climate.power;
            const decision = climate.reason;
            const entityId = climate.entity_id;
            const manualOverride = climate.manual_override;
            const useEstimated = climate.use_estimated_power;
            const estimatedWatt = climate.estimated_wattage;
            const powerSensor = climate.power_sensor || '';
            const windowSensors = climate.window_sensors || [];

            const powerOptionsHtml = selectOptions(powerOptions, powerSensor);
            const windowOptionsHtml = multiSelectOptions(windowOptions, windowSensors);
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${name}</td>
              <td><code>${entityId}</code></td>
              <td>
                <input type="number" min="1" max="10" value="${priority}" style="width:64px" data-act="priority" />
              </td>
              <td>
                <input type="checkbox" ${enabled ? 'checked' : ''} data-act="enabled" />
              </td>
              <td>
                <div style="display:flex; gap:8px; align-items:center">
                  <span>${windows}</span>
                  <details>
                    <summary>edit</summary>
                    <div style="margin-top:8px">
                      <label>Window sensors:
                        <select multiple data-act="window_sensors_select" style="min-width:280px; min-height:90px">
                          ${windowOptionsHtml}
                        </select>
                      </label>
                      <button data-act="save_windows" style="margin-left:8px">Save</button>
                    </div>
                  </details>
                </div>
              </td>
              <td>
                <div style="display:flex; gap:8px; align-items:center">
                  <span>${power} W</span>
                  <details>
                    <summary>edit</summary>
                    <div style="margin-top:8px">
                      <label><input type="checkbox" ${
                        useEstimated ? 'checked' : ''
                      } data-act="use_estimated" /> Use estimated</label>
                      <div style="margin-top:6px">
                        <label>Estimated W: <input type="number" min="100" max="5000" value="${estimatedWatt}" data-act="wattage" style="width:90px" /></label>
                      </div>
                      <div style="margin-top:6px">
                        <label>Power sensor:
                          <select data-act="power_sensor_select" style="min-width:260px">
                            ${powerOptionsHtml}
                          </select>
                        </label>
                      </div>
                      <button data-act="save_power">Save</button>
                    </div>
                  </details>
                </div>
              </td>
              <td>
                <div class="decision">
                  ${manualOverride ? '<span class="tag warn">Manual override</span>' : ''}
                  <span class="muted">${decision}</span>
                </div>
              </td>
              <td>
                <button data-act="save_priority">Save</button>
                <button data-act="remove_climate">Remove</button>
              </td>
            `;
            tr.querySelector('[data-act="enabled"]').addEventListener('change', async (ev) => {
              const enabled = ev.target.checked;
              await haCall('smart_airco', 'toggle_climate_entity', {
                entity_id: entityId,
                enabled,
              });
              const reloaded = await waitForReload();
              showNotice(
                enabled ? 'Automation re-enabled for this AC.' : 'Automation disabled for this AC.',
                reloaded ? 'success' : 'error'
              );
            });
            tr.querySelector('[data-act="save_priority"]').addEventListener('click', async (ev) => {
              const val = parseInt(tr.querySelector('[data-act="priority"]').value, 10);
              if (!Number.isFinite(val)) return;
              await haCall('smart_airco', 'set_climate_priority', {
                entity_id: entityId,
                priority: val,
              });
              const reloaded = await waitForReload();
              showNotice('Priority updated.', reloaded ? 'success' : 'error');
            });
            tr.querySelector('[data-act="save_power"]').addEventListener('click', async (ev) => {
              const use_estimated_power = tr.querySelector('[data-act="use_estimated"]').checked;
              const wattage = parseInt(tr.querySelector('[data-act="wattage"]').value, 10);
              const power_sensor = tr
                .querySelector('[data-act="power_sensor_select"]')
                .value.trim();
              const payload = {
                entity_id: entityId,
                use_estimated_power,
                wattage,
                power_sensor: power_sensor || null,
              };
              await haCall('smart_airco', 'set_climate_power', payload);
              const reloaded = await waitForReload();
              showNotice('Power settings updated.', reloaded ? 'success' : 'error');
            });
            tr.querySelector('[data-act="save_windows"]').addEventListener('click', async (ev) => {
              const sel = tr.querySelector('[data-act="window_sensors_select"]');
              const window_sensors = Array.from(sel.selectedOptions).map((o) => o.value);
              await haCall('smart_airco', 'set_climate_windows', {
                entity_id: entityId,
                window_sensors,
              });
              const reloaded = await waitForReload();
              showNotice('Window sensor settings updated.', reloaded ? 'success' : 'error');
            });
            tr.querySelector('[data-act="remove_climate"]').addEventListener('click', async () => {
              await haCall('smart_airco', 'remove_climate', {
                entity_id: entityId,
              });
              const reloaded = await waitForReload();
              showNotice('Climate removed.', reloaded ? 'success' : 'error');
            });
            tbody.appendChild(tr);
          }
          return true;
        } catch (e) {
          qs('#status').textContent = 'Error';
          qs('#overview').textContent = 'Failed to load data: ' + e.message;
          showNotice(e.message, 'error');
          return false;
        }
      };

      qs('#btn-evaluate').addEventListener('click', async () => {
        clearNotice();
        await haCall('smart_airco', 'evaluate_conditions');
        await load();
        showNotice('Condition evaluation requested.', 'success');
      });
      qs('#btn-add-climate').addEventListener('click', async () => {
        clearNotice();
        const entity_id = (document.getElementById('add-entity').value || '').trim();
        if (!entity_id) return;
        const name = (document.getElementById('add-name').value || '').trim();
        const priority = parseInt(document.getElementById('add-priority').value, 10) || 1;
        const enabled = document.getElementById('add-enabled').checked;
        const use_estimated_power = document.getElementById('add-use-estimated').checked;
        const wattage = parseInt(document.getElementById('add-wattage').value, 10) || 1000;
        const power_sensor = (document.getElementById('add-power-sensor').value || '').trim();
        const payload = {
          entity_id,
          priority,
          enabled,
          use_estimated_power,
          wattage,
        };
        if (name) payload.name = name;
        if (power_sensor) payload.power_sensor = power_sensor;
        await haCall('smart_airco', 'add_climate', payload);
        document.getElementById('add-name').value = '';
        const reloaded = await waitForReload();
        showNotice('Climate added.', reloaded ? 'success' : 'error');
      });
      qs('#btn-execute').addEventListener('click', async () => {
        clearNotice();
        await haCall('smart_airco', 'execute_decisions');
        await load();
        showNotice('Decision execution requested.', 'success');
      });
      qs('#btn-save-global').addEventListener('click', async () => {
        clearNotice();
        const forecast_sensor = (document.getElementById('sel-forecast').value || '').trim();
        const production_sensor = (document.getElementById('sel-production').value || '').trim();
        const net_export_sensor = (document.getElementById('sel-netexport').value || '').trim();
        const update_interval_minutes =
          parseInt(document.getElementById('inp-interval').value, 10) || 5;
        await haCall('smart_airco', 'set_global_settings', {
          forecast_sensor: forecast_sensor || null,
          production_sensor: production_sensor || null,
          net_export_sensor: net_export_sensor || null,
          update_interval_minutes,
        });
        const reloaded = await waitForReload();
        showNotice('Global settings updated.', reloaded ? 'success' : 'error');
      });
      qs('#sel-controller').addEventListener('change', async (ev) => {
        activeEntryId = ev.target.value || null;
        clearNotice();
        await load();
      });

      // Simple throttle to avoid spamming reloads on rapid events
      let refreshTimer = null;
      const scheduleRefresh = () => {
        if (refreshTimer) return;
        refreshTimer = setTimeout(async () => {
          refreshTimer = null;
          await load();
        }, 750);
      };

      const subscribeHass = () => {
        const hass = getHass();
        if (!hass || !hass.connection) return;
        hass.connection.subscribeEvents((ev) => {
          try {
            if (ev?.event_type !== 'state_changed') return;
            const eid = ev?.data?.entity_id || '';
            if (
              eid.startsWith('climate.') ||
              ev?.data?.new_state?.attributes?.smart_airco_controller === true ||
              eid === stateFilter.forecastEntity ||
              eid === stateFilter.productionEntity ||
              eid === stateFilter.netExportEntity ||
              eid.startsWith('binary_sensor.')
            ) {
              scheduleRefresh();
            }
          } catch (_) {}
        }, 'state_changed');
      };

      // Initial load and subscribe to live updates
      load().then(() => subscribeHass());
    </script>
  </body>
</html>
