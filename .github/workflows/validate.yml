name: Validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-homeassistant-custom-component pillow

      - name: Validate JSON metadata
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/smart_airco/manifest.json > /dev/null

      - name: Run Smart Airco tests
        run: pytest tests/components/smart_airco -q
