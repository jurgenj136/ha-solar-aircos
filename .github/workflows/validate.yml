name: Validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Home Assistant 2026.6+ requires Python >=3.14.2; on 3.13 the test
          # harness silently backtracks to a year-old HA, so validation must
          # run on 3.14 to exercise current Home Assistant.
          python-version: '3.14'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-homeassistant-custom-component pillow

      - name: Validate JSON metadata
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/smart_airco/manifest.json > /dev/null

      - name: Run Smart Airco tests
        run: PYTHONPATH=. python -m pytest tests/components/smart_airco -q
